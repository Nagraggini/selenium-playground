name: Java Selenium CI

on:
    push:
        branches:
            - main
    pull_request:
        types: [opened, synchronize, reopened]

permissions:
    contents: write

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            # =========================
            # 1. Checkout
            # =========================
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            # =========================
            # 2. Java 21 setup
            # =========================
            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: 21
                  distribution: temurin
                  cache: maven
                  cache-dependency-path: "**/pom.xml"

            # =========================
            # 3. Cache Maven
            # =========================
            - name: Cache Maven dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.m2
                  key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

            # =========================
            # NEW: Install Maven (csak ha helyi 'act'-ot használsz, GitHub-on alapból van)
            # =========================
            - name: Install Maven
              run: |
                  sudo apt-get update
                  sudo apt-get install -y maven

            # =========================
            # 4. Build project
            # =========================
            - name: Build
              run: mvn -B clean compile

            # =========================
            # 5. Run Tests & Sonar Scan (ÖSSZEVONVA)
            # =========================
            # Egyszerre futtatja a teszteket headless módban, és küldi az adatokat a Sonarnak
            - name: Run Tests and Sonar Scan
              env:
                  HEADLESS: true
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                  SONAR_HOST_URL: https://sonarcloud.io
              # Hozzáadva a -e flag a részletes hibaüzenetekért
              run: mvn -B -e verify sonar:sonar -Dsonar.projectKey=nagraggini_selenium-playground

            # =========================
            # 6. Generate JaCoCo Badges
            # =========================
            - name: Generate JaCoCo Badge
              id: jacoco
              uses: cicirello/jacoco-badge-generator@v2
              with:
                  generate-branches-badge: true
                  jacoco-csv-file: target/site/jacoco/jacoco.csv
                  badges-directory: .github/badges

            # =========================
            # 7. Commit and Push the Badges back to repo
            # =========================
            - name: Commit and push badges
              if: ${{ github.event_name == 'push' }}
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git add .github/badges/*.svg
                  git diff --staged --quiet || git commit -m "chore: update jacoco coverage badges"
                  git push

            # =========================
            # 8. Test reports
            # =========================
            - name: Upload test reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: surefire-reports
                  path: target/surefire-reports
