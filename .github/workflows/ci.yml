name: Java Selenium CI

on:
    push:
        branches:
            - main
    pull_request:
        types: [opened, synchronize, reopened]

# ==========================================
# IDE KERÜLT AZ ENGEDÉLY: Írási jog a repóhoz
# ==========================================
permissions:
    contents: write

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            # =========================
            # 1. Checkout
            # =========================
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            # =========================
            # 2. Java 21 setup
            # =========================
            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: 21
                  distribution: temurin
                  cache: maven
                  cache-dependency-path: "**/pom.xml"

            # =========================
            # 3. Cache Maven
            # =========================
            - name: Cache Maven dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.m2
                  key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

            # =========================
            # NEW: Install Maven manually for local act runner
            # =========================
            - name: Install Maven
              run: |
                  sudo apt-get update
                  sudo apt-get install -y maven

            # =========================
            # 4. Build project
            # =========================
            - name: Build
              run: mvn -B clean compile

            # =========================
            # 5. Install Chrome (Selenium CI-hez kell, még a tesztek előtt!)
            # =========================
            - name: Install Chrome
              run: |
                  sudo apt-get update
                  sudo apt-get install -y wget gnupg
                  wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
                  echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google.list
                  sudo apt-get update
                  sudo apt-get install -y google-chrome-stable

            # =========================
            # 6. Headless Selenium tests (CI safe)
            # =========================
            - name: Run Selenium tests (headless)
              run: mvn -B test
              env:
                  HEADLESS: true

            # =========================
            # 7. SonarQube / SonarCloud
            # =========================
            - name: Sonar scan
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                  SONAR_HOST_URL: https://sonarcloud.io
              run: mvn -B verify sonar:sonar -Dsonar.projectKey=nagraggini_selenium-playground

            # =========================
            # 8. Generate JaCoCo Badges (A riportokból generál)
            # =========================
            - name: Generate JaCoCo Badge
              id: jacoco
              uses: cicirello/jacoco-badge-generator@v2
              with:
                  generate-branches-badge: true
                  jacoco-csv-file: target/site/jacoco/jacoco.csv
                  badges-directory: .github/badges

            # =========================
            # 9. Commit and Push the Badges back to repo
            # =========================
            - name: Commit and push badges
              if: ${{ github.event_name == 'push' }}
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git add .github/badges/*.svg
                  git diff --staged --quiet || git commit -m "chore: update jacoco coverage badges"
                  git push

            # =========================
            # 10. Test reports
            # =========================
            - name: Upload test reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: surefire-reports
                  path: target/surefire-reports
